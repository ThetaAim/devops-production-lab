jenkins:
  systemMessage: "Jenkins ready 🚀"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin123"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

# credentials:
#   system:
#     domainCredentials:
