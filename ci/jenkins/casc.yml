#           - usernamePassword:
#               id: "gitoken"
#               username: "your-user"
#               password: "your-token"

jobs:
  - script: >
      pipelineJob('app-pipeline') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/ThetaAim/devops-production-lab.git')
                  // credentials('gitoken')  
                }
                branch('*/main')
              }
            }
            scriptPath('ci/jenkins/Jenkinsfile')
          }
        }
      }
